<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 影片總結</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: white;
            padding: 3rem 0 2rem;
        }
        .hero h1 {
            font-weight: 700;
            font-size: 2.2rem;
        }
        .hero p {
            opacity: 0.9;
        }
        .card-main {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .btn-summarize {
            background-color: #ff0000;
            border-color: #ff0000;
            font-weight: 600;
            padding: 0.6rem 2rem;
        }
        .btn-summarize:hover:not(:disabled) {
            background-color: #cc0000;
            border-color: #cc0000;
        }
        .summary-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
            line-height: 1.8;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .bullet-icon {
            color: #ff0000;
            font-weight: bold;
            margin-right: 0.6rem;
            flex-shrink: 0;
        }
        #loadingSection .spinner-border {
            color: #ff0000;
            width: 3rem;
            height: 3rem;
        }
        .result-header {
            border-left: 4px solid #ff0000;
            padding-left: 1rem;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="container text-center">
        <h1>YouTube 影片總結</h1>
        <p class="mb-0">輸入 YouTube 網址，幾秒內獲得影片重點摘要</p>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Input Card -->
            <div class="card card-main p-4 mb-4">
                <div class="mb-3">
                    <label for="youtubeUrl" class="form-label fw-semibold">YouTube 影片網址</label>
                    <input type="url"
                           id="youtubeUrl"
                           class="form-control form-control-lg"
                           placeholder="https://www.youtube.com/watch?v=..."
                           autocomplete="off">
                </div>
                <div class="d-grid">
                    <button id="submitBtn" class="btn btn-summarize btn-lg text-white" onclick="summarize()">
                        開始總結
                    </button>
                </div>
            </div>

            <!-- Loading -->
            <div id="loadingSection" class="text-center py-5 d-none">
                <div class="spinner-border mb-3" role="status">
                    <span class="visually-hidden">載入中...</span>
                </div>
                <p id="loadingText" class="text-muted mb-0">正在取得影片字幕...</p>
            </div>

            <!-- Error -->
            <div id="errorSection" class="d-none">
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                         class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                    </svg>
                    <span id="errorMessage"></span>
                </div>
            </div>

            <!-- Result -->
            <div id="resultSection" class="d-none">
                <div class="card card-main p-4">
                    <h5 class="result-header mb-4">影片摘要</h5>
                    <div id="summaryContent"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    async function summarize() {
        const url = document.getElementById('youtubeUrl').value.trim();
        if (!url) {
            showError('請輸入 YouTube 網址');
            return;
        }

        setLoading(true);
        hideAll();
        document.getElementById('loadingSection').classList.remove('d-none');

        const progressTimer = setTimeout(() => {
            document.getElementById('loadingText').textContent = '正在使用 AI 分析內容...';
        }, 3000);

        try {
            const response = await fetch('/api/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const data = await response.json();
            hideAll();

            if (response.ok) {
                renderSummary(data.summary);
            } else {
                // 非 2xx：從 body 取錯誤訊息，搭配 status code 給不同提示
                const message = data.errorMessage || defaultErrorMessage(response.status);
                showError(message);
            }
        } catch (err) {
            hideAll();
            showError('網路錯誤，請確認連線後再試');
        } finally {
            clearTimeout(progressTimer);
            setLoading(false);
        }
    }

    function defaultErrorMessage(status) {
        switch (status) {
            case 400: return '請求格式有誤，請重新輸入';
            case 404: return '找不到該影片，請確認網址是否正確';
            case 422: return '該影片不支援快速總結';
            case 503: return '伺服器忙碌中，請稍後再試';
            default:  return '發生未知錯誤，請稍後再試';
        }
    }

    function renderSummary(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const container = document.getElementById('summaryContent');
        container.innerHTML = '';

        lines.forEach(line => {
            const cleanText = line.replace(/^[•\-\*]\s*/, '');
            if (!cleanText) return;
            const div = document.createElement('div');
            div.className = 'summary-item d-flex';
            div.innerHTML = `<span class="bullet-icon">•</span><span>${escapeHtml(cleanText)}</span>`;
            container.appendChild(div);
        });

        document.getElementById('resultSection').classList.remove('d-none');
    }

    function showError(message) {
        document.getElementById('errorMessage').textContent = message;
        document.getElementById('errorSection').classList.remove('d-none');
    }

    function hideAll() {
        ['loadingSection', 'errorSection', 'resultSection'].forEach(id => {
            document.getElementById(id).classList.add('d-none');
        });
    }

    function setLoading(loading) {
        const btn = document.getElementById('submitBtn');
        btn.disabled = loading;
        btn.textContent = loading ? '處理中...' : '開始總結';
        if (!loading) {
            document.getElementById('loadingText').textContent = '正在取得影片字幕...';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('youtubeUrl').addEventListener('keydown', e => {
            if (e.key === 'Enter') summarize();
        });
    });
</script>

</body>
</html>
