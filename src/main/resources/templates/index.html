<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 影片總結</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 背景 ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080b14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* 動態光暈背景 */
    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: #00d4ff;
      top: -120px; left: -120px;
    }
    body::after {
      width: 600px; height: 600px;
      background: #6366f1;
      bottom: -160px; right: -160px;
      animation-delay: -6s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* 格線 overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── 卡片 ── */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 700px;
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.05),
        0 24px 64px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* 卡片頂部光條 */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00d4ff, #6366f1, transparent);
      opacity: 0.6;
      border-radius: 1px;
    }

    /* ── 標題 ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 100px;
      padding: 4px 12px;
      margin-bottom: 16px;
    }
    .badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 6px #00d4ff;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e2e8f0 30%, #00d4ff 70%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── 輸入列 ── */
    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 18px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input[type="text"]:focus {
      border-color: rgba(0, 212, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), 0 0 20px rgba(0, 212, 255, 0.05);
    }
    input[type="text"]::placeholder { color: #334155; }

    /* ── 按鈕 ── */
    button {
      position: relative;
      padding: 13px 24px;
      background: linear-gradient(135deg, #00d4ff, #6366f1);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25);
      overflow: hidden;
    }
    button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0, 212, 255, 0.4);
    }
    button:hover:not(:disabled)::after { opacity: 1; }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled {
      background: rgba(255, 255, 255, 0.06);
      color: #334155;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── 結果區 ── */
    .result {
      margin-top: 32px;
      display: none;
      animation: slide-up 0.3s ease;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .result-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.3), transparent);
    }

    .result-box {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 3px solid #00d4ff;
      border-radius: 12px;
      padding: 22px 24px;
      font-size: 0.93rem;
      line-height: 1.85;
      word-break: break-word;
      color: #cbd5e1;
    }

    /* Markdown 渲染樣式 */
    .result-box p   { margin-bottom: 0.6em; }
    .result-box p:last-child { margin-bottom: 0; }
    .result-box ul  { padding-left: 1.4em; margin-bottom: 0.6em; }
    .result-box li  { margin-bottom: 0.35em; }
    .result-box ul ul { margin-top: 0.25em; margin-bottom: 0.25em; }
    .result-box strong { color: #e2e8f0; font-weight: 600; }
    .result-box em     { color: #94a3b8; font-style: italic; }
    .result-box h1, .result-box h2, .result-box h3 {
      color: #e2e8f0;
      font-weight: 600;
      margin: 0.8em 0 0.4em;
    }
    .result-box code {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.88em;
      color: #00d4ff;
    }

    .result-box.error {
      border-left-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.05);
      white-space: pre-wrap;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="card">
    <div class="badge">AI Powered</div>
    <h1>YouTube 影片總結</h1>
    <p class="subtitle">貼上影片網址，AI 自動擷取字幕並整理重點摘要</p>

    <div class="input-row">
      <input
        id="urlInput"
        type="text"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
      />
      <button id="submitBtn" onclick="summarize()">總結</button>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <span class="result-label" id="resultLabel">摘要結果</span>
        <div class="result-divider"></div>
      </div>
      <div class="result-box" id="resultBox"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    const API_URL = "/api/summarize";

    const urlInput   = document.getElementById("urlInput");
    const submitBtn  = document.getElementById("submitBtn");
    const result     = document.getElementById("result");
    const resultBox  = document.getElementById("resultBox");
    const resultLabel = document.getElementById("resultLabel");

    urlInput.addEventListener("keydown", e => {
      if (e.key === "Enter") summarize();
    });

    async function summarize() {
      const url = urlInput.value.trim();
      if (!url) return;

      setLoading(true);
      result.style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept-Language": navigator.language || "zh-TW"
          },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (data.success) {
          showResult(data.summary, false);
        } else {
          showResult(data.errorMessage || "發生未知錯誤", true);
        }
      } catch (err) {
        showResult("無法連接伺服器，請稍後再試", true);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading
        ? '<span class="spinner"></span>分析中...'
        : "總結";
    }

    function showResult(text, isError) {
      resultLabel.textContent = isError ? "錯誤" : "摘要結果";
      resultBox.className = "result-box" + (isError ? " error" : "");
      if (isError) {
        resultBox.textContent = text;
      } else {
        // 將 Gemini 輸出的 • 轉為標準 Markdown 清單，再渲染
        const md = text.replace(/^•\s*/gm, "- ");
        resultBox.innerHTML = marked.parse(md);
      }
      result.style.display = "block";
    }
  </script>
</body>
</html>
